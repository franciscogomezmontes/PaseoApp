<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email confirmado – PaseoApp</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --primary: #1B4F72;
      --primary-light: #2471a3;
      --success: #10B981;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --primary: #3b82f6;
        --primary-light: #60a5fa;
        --success: #34d399;
        --text: #f1f5f9;
        --text-secondary: #94a3b8;
        --border: #334155;
      }
    }

    :root[data-theme="light"] {
      --bg: #f1f5f9;
      --card: #ffffff;
      --primary: #1B4F72;
      --primary-light: #2471a3;
      --success: #10B981;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }

    :root[data-theme="dark"] {
      --bg: #0f172a;
      --card: #1e293b;
      --primary: #3b82f6;
      --primary-light: #60a5fa;
      --success: #34d399;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .app-icon {
      font-size: 28px;
      line-height: 1;
    }

    .app-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.3px;
    }

    .success-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--success) 12%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .checkmark {
      width: 36px;
      height: 36px;
      stroke: var(--success);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .checkmark path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw 0.5s ease forwards 0.2s;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .checkmark path { animation: none; stroke-dashoffset: 0; }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      text-wrap: balance;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      text-wrap: balance;
      margin-bottom: 32px;
    }

    .open-btn {
      display: inline-block;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      width: 100%;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .open-btn:hover {
      background: var(--primary-light);
    }

    .open-btn:active {
      transform: scale(0.98);
    }

    .open-btn:focus-visible {
      outline: 3px solid var(--primary);
      outline-offset: 3px;
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-header">
      <span class="app-icon">🌴</span>
      <span class="app-name">PaseoApp</span>
    </div>

    <div class="success-ring">
      <svg class="checkmark" viewBox="0 0 36 36" aria-hidden="true">
        <path d="M8 18 L15 25 L28 11" />
      </svg>
    </div>

    <h1>Email confirmado</h1>
    <p class="subtitle">Tu cuenta está lista. Abre PaseoApp en tu teléfono para empezar a organizar tu próximo paseo.</p>

    <a href="paseoapp://" class="open-btn">Abrir PaseoApp</a>
  </div>

  <p class="footer">Hecho con ❤️ en Colombia · PaseoApp</p>
</body>
</html>
